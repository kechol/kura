name: Docs

# Build the Astro docs site on `main` pushes (smoke test) and on `vX.Y.Z` tag
# pushes (the published build). Pages deployment fires only for tags and for a
# manual `workflow_dispatch` with publish=true — the published site tracks
# tagged releases, not the rolling `main` branch. PRs do not run docs CI.
on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Pages (manual deploy; off by default)."
        type: boolean
        default: false

permissions:
  contents: read

# One in-flight Pages deployment at a time; never cancel a deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
        working-directory: docs
      - run: bun run build
        working-directory: docs
      # Upload the Pages artifact only when this build will be published:
      # a tag ref, or a manual dispatch with publish=true. main pushes stop here.
      - if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
        uses: actions/configure-pages@v5
      - if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: deploy
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
