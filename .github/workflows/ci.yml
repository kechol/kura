name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read-only by default; no job here writes to the repo.
permissions:
  contents: read

jobs:
  check:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to a stable version to avoid the dlopen regression (oven-sh/bun#30717)
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # macOS needs the Homebrew SQLite keg — Apple's bundled SQLite cannot
      # load the sqlite-vec / sqlite-vaporetto extensions (docs: native-extensions.md).
      - if: runner.os == 'macOS'
        run: brew install sqlite
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      # Retry once as a safety net. The root cause of the occasional
      # "database is locked" (SQLITE_BUSY) is transient WAL write-lock
      # contention under slow/loaded CI runners, addressed at the source by the
      # raised busy_timeout in src/core/db.ts; the retry backstops any residual
      # flake. A real regression is deterministic and fails both attempts.
      #
      # The real vaporetto download → SHA256 → dlopen → tokenization test runs
      # on linux-x64 only (KURA_TEST_DOWNLOAD); elsewhere the suite runs offline.
      - if: runner.os == 'Linux'
        run: bun test || (echo "::warning::bun test flaked (retrying once)" && bun test)
        env:
          KURA_TEST_DOWNLOAD: "1"
      - if: runner.os != 'Linux'
        run: bun test || (echo "::warning::bun test flaked (retrying once)" && bun test)
