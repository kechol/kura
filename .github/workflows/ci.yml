name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to a stable version to avoid the dlopen regression (oven-sh/bun#30717)
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
        env:
          # Enable the real vaporetto download + load integration test (linux-x64)
          KURA_TEST_DOWNLOAD: "1"
