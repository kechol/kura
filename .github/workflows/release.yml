name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to a stable version to avoid the dlopen regression (oven-sh/bun#30717)
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Cross-compile all targets
        run: |
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64 bun-windows-x64; do
            bun run scripts/compile.ts --target "$target" --outfile "release/$target/kura"
          done
      - name: Package ZIPs with installers
        env:
          TAG: ${{ github.ref_name }}
        run: bun run scripts/package-release.ts "$TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes release/*.zip
