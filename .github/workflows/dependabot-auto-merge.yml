name: Dependabot auto-merge

# Auto-merge low-risk Dependabot PRs once required status checks pass.
# Major-version bumps still require manual review (often breaking). Security
# updates always auto-merge regardless of the semver bump.
#
# Prerequisites:
#   - Settings -> General -> Pull Requests -> "Allow auto-merge" enabled.
#   - Branch protection on main requiring the CI checks in ci.yml; auto-merge
#     waits for them before merging.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for safe updates
        # Auto-merge when the bump is patch or minor, or when the update was
        # raised by Dependabot security updates. Major bumps fall through to a
        # human reviewer.
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
          || steps.metadata.outputs.update-type == 'version-update:semver-minor'
          || steps.metadata.outputs.alert-state == 'AUTO_DISMISSED'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
