version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Root Bun/npm dependencies (package.json + bun.lock).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Batch dev-only bumps into a single PR to cut review noise.
      dev-dependencies:
        dependency-type: development

  # Docs site (Astro / Starlight) dependencies under docs/.
  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
    groups:
      docs:
        patterns: ["*"]
